<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windflow — Rapidly build modern websites</title>

  <!-- Google Fonts: Inter + IBM Plex Mono (exact fonts from tailwindcss.com) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind extended config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            'brand-slate-950': '#030712',
            'brand-slate-900': '#0f172a',
            'brand-slate-800': '#1e293b',
            'brand-slate-700': '#334155',
            'brand-slate-600': '#475569',
            'brand-slate-500': '#64748b',
            'brand-slate-400': '#94a3b8',
            'brand-slate-200': '#e2e8f0',
            'brand-slate-100': '#f1f5f9',
            'brand-slate-50': '#f8fafc',
            'brand-gray-950': '#030712',
            'brand-gray-900': '#111827',
            'brand-gray-500': '#6b7280',
            'brand-gray-400': '#9ca3af',
            'brand-gray-200': '#e5e7eb',
            'brand-gray-100': '#f3f4f6',
            'brand-cyan-600': '#0891b2',
            'brand-cyan-500': '#06b6d4',
            'brand-cyan-100': '#cffafe',
            'brand-emerald-500': '#10b981',
            'brand-emerald-50': '#f0fdf4',
            'brand-sky-100': '#e0f2fe',
            'brand-green-300': '#86efac',
            'brand-blue-300': '#93c5fd',
          },
          boxShadow: {
            'card': '0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.07)',
            'card-hover': '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.07)',
            'xl-soft': '0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.08)',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translateY(-8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
            'fade-in-up-delay-1': 'fadeInUp 0.6s ease-out 0.15s forwards',
            'fade-in-up-delay-2': 'fadeInUp 0.6s ease-out 0.3s forwards',
            'fade-in-up-delay-3': 'fadeInUp 0.6s ease-out 0.45s forwards',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-down': 'slideDown 0.4s ease-out forwards',
            'float': 'float 3s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 2.5s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <!-- React + Babel CDN for JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Base resets matching tailwindcss.com */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #ffffff;
      color: #030712;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Initial opacity 0 for animated elements (set by JS after load) */
    .animate-on-load {
      opacity: 0;
    }

    /* Hero background orbs */
    .hero-orb-1 {
      background: radial-gradient(ellipse at center, rgba(224, 242, 254, 0.7) 0%, transparent 70%);
    }
    .hero-orb-2 {
      background: radial-gradient(ellipse at center, rgba(209, 250, 229, 0.6) 0%, transparent 70%);
    }

    /* Custom scrollbar (matches site's minimal aesthetic) */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Gradient badge */
    .badge-gradient {
      background: linear-gradient(135deg, #06b6d4, #10b981);
    }

    /* Feature section background */
    .features-bg {
      background: linear-gradient(to bottom right, #f8fafc, #f0fdf4);
    }

    /* Code block styles */
    .code-block {
      background: #0f172a;
      border-radius: 0.75rem;
      overflow: hidden;
    }
    .code-block-header {
      background: linear-gradient(to right, #1e293b, #0f172a);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .code-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .code-text {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 0.8125rem;
      line-height: 1.8;
      color: #e2e8f0;
      padding: 1.25rem 1.5rem;
      tab-size: 2;
    }
    .code-keyword { color: #93c5fd; }
    .code-string { color: #86efac; }
    .code-class { color: #fde68a; }
    .code-attr { color: #f9a8d4; }
    .code-comment { color: #64748b; }
    .code-value { color: #c4b5fd; }

    /* Sticky nav shadow on scroll */
    .nav-scrolled {
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.07);
    }

    /* Hover card transition */
    .feature-card {
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }
    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.06);
      border-color: #d1fae5;
    }

    /* Nav link hover */
    .nav-link {
      transition: color 150ms ease;
      color: #374151;
    }
    .nav-link:hover { color: #030712; }

    /* Primary button */
    .btn-primary {
      background: #0f172a;
      color: #fff;
      transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }
    .btn-primary:hover {
      background: #1e293b;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgb(15 23 42 / 0.25);
    }
    .btn-primary:active { transform: translateY(0); }

    /* Secondary button */
    .btn-secondary {
      background: transparent;
      color: #374151;
      border: 1px solid #e5e7eb;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }
    .btn-secondary:hover {
      background: #f9fafb;
      border-color: #d1d5db;
      transform: translateY(-1px);
    }

    /* Footer link */
    .footer-link {
      transition: color 150ms ease;
      color: #6b7280;
    }
    .footer-link:hover { color: #111827; }

    /* Mobile menu */
    .mobile-menu {
      animation: slideDown 0.25s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── ICONS ───────────────────────────────────────────────────────────────

    const IconResponsive = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/>
      </svg>
    );

    const IconDark = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    );

    const IconGrid = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    );

    const IconZap = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );

    const IconLayers = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
    );

    const IconCode = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    );

    const IconPalette = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="8" cy="9" r="1.5" fill="currentColor"/>
        <circle cx="15" cy="9" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="15" r="1.5" fill="currentColor"/>
      </svg>
    );

    const IconBox = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
    );

    const IconRefresh = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    );

    const IconShield = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    );

    const IconTrend = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
    );

    const IconGitHub = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    );

    const IconMenu = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    );

    const IconX = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );

    // ─── NAVBAR ───────────────────────────────────────────────────────────────

    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 8);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const navLinks = [
        { href: '#docs', label: 'Docs' },
        { href: '#blog', label: 'Blog' },
        { href: '#showcase', label: 'Showcase' },
        { href: '#sponsor', label: 'Sponsor' },
        { href: '#plus', label: 'Plus', accent: true },
      ];

      return (
        <header
          className={`sticky top-0 z-50 w-full border-b border-[#f3f4f6] bg-white/85 backdrop-blur-sm animate-slide-down ${scrolled ? 'nav-scrolled' : ''}`}
          style={{ transition: 'box-shadow 200ms ease' }}
        >
          <nav className="mx-auto flex h-16 max-w-7xl items-center justify-between px-6 lg:px-8">
            {/* Logo */}
            <a href="#" className="flex items-center gap-2 font-sans no-underline">
              <div className="flex items-center justify-center w-8 h-8 rounded-lg badge-gradient">
                <svg viewBox="0 0 24 24" fill="white" className="w-4 h-4">
                  <path d="M12.001 4.8c-3.2 0-5.2 1.6-6 4.8 1.2-1.6 2.6-2.2 4.2-1.8.913.228 1.565.89 2.288 1.624C13.666 10.618 15.027 12 18.001 12c3.2 0 5.2-1.6 6-4.8-1.2 1.6-2.6 2.2-4.2 1.8-.913-.228-1.565-.89-2.288-1.624C16.337 6.182 14.976 4.8 12.001 4.8zm-6 7.2c-3.2 0-5.2 1.6-6 4.8 1.2-1.6 2.6-2.2 4.2-1.8.913.228 1.565.89 2.288 1.624 1.177 1.194 2.538 2.576 5.512 2.576 3.2 0 5.2-1.6 6-4.8-1.2 1.6-2.6 2.2-4.2 1.8-.913-.228-1.565-.89-2.288-1.624C10.337 13.382 8.976 12 6.001 12z"/>
                </svg>
              </div>
              <span className="text-[#030712] font-semibold text-base tracking-tight">Windflow</span>
            </a>

            {/* Desktop nav links */}
            <div className="hidden md:flex items-center gap-7">
              {navLinks.map(link => (
                <a
                  key={link.href}
                  href={link.href}
                  className={`nav-link text-sm font-medium no-underline ${link.accent ? 'text-[#06b6d4] hover:text-[#0891b2]' : ''}`}
                >
                  {link.label}
                </a>
              ))}
            </div>

            {/* Right side: GitHub + CTA */}
            <div className="hidden md:flex items-center gap-3">
              <a
                href="https://github.com"
                className="text-[#6b7280] hover:text-[#030712] transition-colors duration-150 p-1"
                aria-label="GitHub"
              >
                <IconGitHub />
              </a>
              <a
                href="#get-started"
                className="btn-primary inline-flex items-center rounded-lg px-4 py-2 text-sm font-medium no-underline"
              >
                Get started
              </a>
            </div>

            {/* Mobile hamburger */}
            <button
              className="md:hidden p-2 text-[#374151] hover:text-[#030712] transition-colors"
              onClick={() => setMobileOpen(!mobileOpen)}
              aria-label="Toggle menu"
            >
              {mobileOpen ? <IconX /> : <IconMenu />}
            </button>
          </nav>

          {/* Mobile menu */}
          {mobileOpen && (
            <div className="mobile-menu md:hidden border-t border-[#f3f4f6] bg-white px-6 py-4 flex flex-col gap-3">
              {navLinks.map(link => (
                <a
                  key={link.href}
                  href={link.href}
                  className={`text-sm font-medium py-1 no-underline ${link.accent ? 'text-[#06b6d4]' : 'text-[#374151]'}`}
                  onClick={() => setMobileOpen(false)}
                >
                  {link.label}
                </a>
              ))}
              <a
                href="#get-started"
                className="btn-primary mt-2 inline-flex items-center justify-center rounded-lg px-4 py-2.5 text-sm font-medium no-underline"
                onClick={() => setMobileOpen(false)}
              >
                Get started
              </a>
            </div>
          )}
        </header>
      );
    }

    // ─── HERO ─────────────────────────────────────────────────────────────────

    function Hero() {
      return (
        <section className="relative overflow-hidden bg-white pt-24 pb-20 md:pt-32 md:pb-28 text-center">
          {/* Background orbs */}
          <div className="hero-orb-1 absolute -left-24 top-0 w-[600px] h-[600px] rounded-full pointer-events-none" aria-hidden="true" />
          <div className="hero-orb-2 absolute -right-24 top-0 w-[500px] h-[500px] rounded-full pointer-events-none" aria-hidden="true" />

          <div className="relative mx-auto max-w-7xl px-6 lg:px-8">
            {/* Badge */}
            <div className="animate-fade-in flex justify-center mb-7" style={{opacity: 0}}>
              <span className="inline-flex items-center gap-2 rounded-full border border-[#d1fae5] bg-[#f0fdf4] px-4 py-1.5 text-xs font-medium text-[#10b981] tracking-wide">
                <span className="w-1.5 h-1.5 rounded-full bg-[#10b981] animate-pulse-soft inline-block" />
                Windflow v4.0 — Now available
              </span>
            </div>

            {/* Main headline */}
            <h1
              className="animate-fade-in-up mx-auto max-w-3xl text-4xl md:text-5xl lg:text-[4.5rem] font-extrabold tracking-[-0.03em] leading-[1.08] text-[#030712] mb-6"
              style={{ opacity: 0, textWrap: 'balance' }}
            >
              Rapidly build modern websites without ever leaving your{' '}
              <span className="relative inline-block">
                <span className="relative z-10 bg-gradient-to-r from-[#06b6d4] to-[#10b981] bg-clip-text text-transparent">HTML.</span>
              </span>
            </h1>

            {/* Subheading */}
            <p
              className="animate-fade-in-up-delay-1 mx-auto max-w-2xl text-lg md:text-xl text-[#6b7280] leading-[1.75] mb-10"
              style={{ opacity: 0 }}
            >
              A utility-first CSS framework packed with classes like{' '}
              <code className="font-mono text-sm font-medium text-[#0891b2] bg-[#cffafe]/40 px-1.5 py-0.5 rounded">flex</code>,{' '}
              <code className="font-mono text-sm font-medium text-[#0891b2] bg-[#cffafe]/40 px-1.5 py-0.5 rounded">pt-4</code>,{' '}
              <code className="font-mono text-sm font-medium text-[#0891b2] bg-[#cffafe]/40 px-1.5 py-0.5 rounded">text-center</code> and{' '}
              <code className="font-mono text-sm font-medium text-[#0891b2] bg-[#cffafe]/40 px-1.5 py-0.5 rounded">rotate-90</code>{' '}
              that can be composed to build any design, directly in your markup.
            </p>

            {/* CTA Buttons */}
            <div
              className="animate-fade-in-up-delay-2 flex flex-col sm:flex-row items-center justify-center gap-3 mb-16"
              style={{ opacity: 0 }}
            >
              <a
                href="#get-started"
                className="btn-primary inline-flex items-center gap-2 rounded-xl px-6 py-3 text-base font-semibold no-underline w-full sm:w-auto justify-center"
              >
                Get started
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4">
                  <path fillRule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clipRule="evenodd"/>
                </svg>
              </a>
              <a
                href="#docs"
                className="btn-secondary inline-flex items-center gap-2 rounded-xl px-6 py-3 text-base font-semibold no-underline w-full sm:w-auto justify-center"
              >
                Read the docs
              </a>
            </div>

            {/* Code example window */}
            <div
              className="animate-fade-in-up-delay-3 mx-auto max-w-2xl"
              style={{ opacity: 0 }}
            >
              <div className="code-block shadow-xl-soft border border-white/10">
